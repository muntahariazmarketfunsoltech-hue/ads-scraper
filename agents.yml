name: Run Two Scraper Agents

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  top-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run top agent
        run: |
          python agent_runner.py top

  bottom-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run bottom agent
        run: |
          python agent_runner.py bottom

  check-and-retrigger:
    runs-on: ubuntu-latest
    needs: [top-agent, bottom-agent]
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check remaining rows
        id: check
        run: |
          python check_remaining.py

      - name: Re-trigger workflow if rows remain
        if: steps.check.outputs.remaining != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Rows remain. Triggering workflow again..."
          gh workflow run agents.yml --ref main