name: Run Two Scraper Agents

on:
  workflow_dispatch:

jobs:
  top-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 5 hours 50 minutes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Create creds.json safely from the multiline secret
      - name: Create creds.json from secret
        shell: bash
        run: |
          cat <<'EOF' > creds.json
       ${{ secrets.CREDS_JSON }}
       EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run top agent
        run: |
          python agent_runner.py top

  bottom-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Create creds.json safely from the multiline secret
      - name: Create creds.json from secret
        shell: bash
        run: |
          cat <<'EOF' > creds.json
           ${{ secrets.CREDS_JSON }}
       EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run bottom agent
        run: |
          python agent_runner.py bottom

  check-and-retrigger:
    runs-on: ubuntu-latest
    needs: [top-agent, bottom-agent]
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check remaining rows
        run: |
          python check_remaining.py